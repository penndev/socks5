<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="titleDocument">PAC 规则编辑</title>
  <link rel="icon" href="/subscribe/logo.png" type="image/png">
  <link rel="stylesheet" href="pac.css">
</head>
<body>
  <div class="page">
    <header class="page-head">
      <div class="brand">
        <img class="brand-logo" src="/subscribe/logo.png" width="38" height="38" alt="Prism">
        <div>
          <h1 id="titleMain">Prism PAC 规则管理</h1>
          <p id="titleDesc">按域名维护代理与直连规则，保存后自动生成 pac.js。</p>
        </div>
      </div>
    </header>

    <section class="panel">
      <h2 id="sectionEditorTitle">规则编辑</h2>
      <p id="sectionEditorDesc" class="subline">每行一个域名，例如 <code>google.com</code> 或 <code>github.com</code>。</p>
      <div class="row">
        <label><input type="radio" name="mode" value="proxy" checked> <span id="labelProxy">输入域名走代理</span></label>
        <label><input type="radio" name="mode" value="direct"> <span id="labelDirect">输入域名走直连</span></label>
      </div>
      <textarea id="domains" placeholder="example.com&#10;api.example.com"></textarea>
      <div class="row">
        <button id="btnSave" class="btn primary" type="button">保存并生成 pac.js</button>
        <span id="msg" class="muted"></span>
      </div>
      <div class="muted"><span id="pacLinkLabel">PAC 文件地址:</span> <a href="/pac.js" target="_blank">/pac.js</a></div>
    </section>
  </div>
  <script src="/common/app-ui.js"></script>
  <script src="/common/i18n.js"></script>
  <script>
    const I18N = (window.WEB_I18N && window.WEB_I18N.pac) || {};
    const APP_CONFIG_DEFAULT = window.WebAppUI.APP_CONFIG_DEFAULT;
    const translate = window.WebAppUI.createTranslator(I18N, 'zh-CN');
    let currentLang = APP_CONFIG_DEFAULT.language;
    const domainsEl = document.getElementById('domains');
    const msgEl = document.getElementById('msg');
    const btnSave = document.getElementById('btnSave');

    function t(key, params) {
      return translate(currentLang, key, params);
    }

    function getMode() {
      const node = document.querySelector('input[name="mode"]:checked');
      return node ? node.value : 'proxy';
    }

    function setMode(mode) {
      const node = document.querySelector('input[name="mode"][value="' + mode + '"]');
      if (node) node.checked = true;
    }

    async function api(url, opt = {}) {
      const resp = await fetch(url, opt);
      if (!resp.ok) throw new Error(await resp.text());
      const ct = resp.headers.get('content-type') || '';
      if (ct.includes('application/json')) return await resp.json();
      return await resp.text();
    }

    async function loadAppConfig() {
      const cfg = await window.WebAppUI.fetchAppConfig(api);
      currentLang = window.WebAppUI.normalizeLanguage(I18N, cfg.language, 'zh-CN');
      window.WebAppUI.applyTheme(cfg.themeMode || APP_CONFIG_DEFAULT.themeMode);
    }

    function applyI18n() {
      document.title = t('title.document');
      document.getElementById('titleMain').textContent = t('title.main');
      document.getElementById('titleDesc').textContent = t('title.desc');
      document.getElementById('sectionEditorTitle').textContent = t('section.editor.title');
      document.getElementById('sectionEditorDesc').innerHTML = t('section.editor.desc');
      document.getElementById('labelProxy').textContent = t('mode.proxy');
      document.getElementById('labelDirect').textContent = t('mode.direct');
      domainsEl.placeholder = t('domains.placeholder');
      btnSave.textContent = t('button.save');
      document.getElementById('pacLinkLabel').textContent = t('link.pac');
    }

    async function loadConfig() {
      try {
        const cfg = await api('/pac/api/config');
        domainsEl.value = cfg.domains || '';
        setMode(cfg.mode || 'proxy');
        msgEl.textContent = t('status.loaded');
      } catch (e) {
        msgEl.textContent = e.message;
      }
    }

    async function saveConfig() {
      btnSave.disabled = true;
      msgEl.textContent = t('status.saving');
      try {
        await api('/pac/api/config', {
          method: 'PUT',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ domains: domainsEl.value, mode: getMode() })
        });
        msgEl.textContent = t('status.saved');
      } catch (e) {
        msgEl.textContent = e.message;
      } finally {
        btnSave.disabled = false;
      }
    }

    btnSave.addEventListener('click', saveConfig);
    (async function bootstrap() {
      await loadAppConfig();
      applyI18n();
      await loadConfig();
    })();
  </script>
</body>
</html>
